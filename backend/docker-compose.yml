services:
  # Opsional: Postgres bawaan Docker. Nonaktif secara default — dev memakai Postgres lokal :5432.
  postgres:
    profiles: ["docker-db"]
    image: postgres:16-alpine
    container_name: vero-travel-postgres
    environment:
      POSTGRES_USER: vero_user
      POSTGRES_PASSWORD: password_aman
      POSTGRES_DB: vero_travel
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vero_user -d vero_travel"]
      interval: 5s
      timeout: 5s
      retries: 5

  vero-travel-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vero-travel-api
    network_mode: host
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
