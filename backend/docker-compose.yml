services:
  vero-travel-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vero-travel-api
    env_file:
      - .env
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
