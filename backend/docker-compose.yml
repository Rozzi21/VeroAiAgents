services:
  # Opsional: Postgres bawaan Docker. Nonaktif secara default — dev memakai Postgres lokal :5432.
  postgres:
    profiles: ["docker-db"]
    image: postgres:16-alpine
    container_name: vero-travel-postgres
    environment:
      POSTGRES_USER: vero_user
      # Dev fallback is intentionally non-secret. Override POSTGRES_PASSWORD in
      # shell/.env before running docker-db profile; rotate old demo password.
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change_me_dev_password}
      POSTGRES_DB: vero_travel
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vero_user -d vero_travel"]
      interval: 5s
      timeout: 5s
      retries: 5

  vero-travel-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vero-travel-api
    # SEC-20: no host networking; publish only API port to the host.
    ports:
      - "8080:8080"
    # Default bridge network can reach host services via host.docker.internal.
    # If using docker-db profile, set DATABASE_HOST=postgres in backend/.env.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      # Override .env host-style defaults inside the container. For docker-db
      # profile set DOCKER_DATABASE_HOST=postgres (or DOCKER_DATABASE_URL).
      DATABASE_HOST: ${DOCKER_DATABASE_HOST:-host.docker.internal}
      DATABASE_PORT: ${DOCKER_DATABASE_PORT:-5432}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-}
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  uploads_data:
